name: "HITLT Bitstream"
description: "Run Synthesis and P&R for hardware-in-the-loop tests"

inputs:
  cache:
    description: "cache argument to attic push"
    required: true
  testcase:
    description: "pattern selecting the tests to be executed"
    required: true
    default: "none"

runs:
  using: "composite"
  steps:
    - name: "Run Synthesis and P&R"
      shell: bash
      run: |
        nix build --no-link .#packages.x86_64-linux.hitlt.${{ inputs.testcase }}.src^*
        nix build --no-link .#packages.x86_64-linux.hitlt.${{ inputs.testcase }}^*
    - name: "Push any changes to the cache"
      shell: bash
      run: |
        attic push \
          "${{ inputs.cache }}" \
          "$(nix path-info .#packages.x86_64-linux.hitlt.${{ inputs.testcase }}.src^out)" \
          "$(nix path-info .#packages.x86_64-linux.hitlt.${{ inputs.testcase }}.src^log)" \
          "$(nix path-info .#packages.x86_64-linux.hitlt.${{ inputs.testcase }}^out)" \
          "$(nix path-info .#packages.x86_64-linux.hitlt.${{ inputs.testcase }}^log)"
    - name: "Fetch Logs"
      shell: bash
      run: |
        mkdir -p _build
        cp $(nix path-info .#packages.x86_64-linux.hitlt.${{ inputs.testcase }}.src^log)/*.log _build
        cp $(nix path-info .#packages.x86_64-linux.hitlt.${{ inputs.testcase }}^log)/*.log _build
    - name: "Upload Logs"
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.testcase }}-logs
        path: "_build/*.log"
        retention-days: 14
